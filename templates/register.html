{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h2>회원가입</h2>
<form method="post">
  사용자명:
  <input
    type="text"
    name="username"
    minlength="4"
    maxlength="20"
    pattern="[A-Za-z0-9_]+"
    title="4~20자의 영문, 숫자, 밑줄만 사용할 수 있습니다."
    autocomplete="username"
    required
  ><br>

  비밀번호:
  <input
    type="password"
    name="password"
    minlength="8"
    maxlength="64"
    autocomplete="new-password"
    required
  ><br>

  <button type="submit">회원가입</button>
</form>
{% endblock %}
